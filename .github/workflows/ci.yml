name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  merge_group:
    types: [checks_requested]

permissions:
  contents: read

jobs:
  risk-classification:
    name: risk-classification/pass
    runs-on: sylphx-linux-standard
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 2

      - name: ADR-29 risk classification
        uses: SylphxAI/.github/.github/actions/adr29-admission@main
        with:
          mode: classify
          policy-mode: observe

  ci:
    runs-on: sylphx-linux-standard
    steps:
      - uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22.14.0"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify package
        run: npm run verify

      - name: Public surface audit (README discovery)
        run: npx vitest run test/readmeDiscovery.test.ts

      - name: Test project-control boundary
        run: npm run test:project-control

      - name: GroundAtlas package dogfood
        id: groundatlas
        uses: SylphxAI/groundatlas@v0.1.3
        with:
          package-spec: groundatlas@0.1.3
          output-dir: .groundatlas-pilot
          require-atlas: "true"
          strict: "true"

      - name: Assert GroundAtlas truth boundary
        run: |
          node - "${{ steps.groundatlas.outputs.manifest-report-path }}" "${{ steps.groundatlas.outputs.fleet-report-path }}" "${{ steps.groundatlas.outputs.fleet-markdown-report-path }}" <<'NODE'
          const [manifestPath, fleetPath, fleetMarkdownPath] = process.argv.slice(2);
          const { readFileSync } = require("node:fs");
          const manifest = JSON.parse(readFileSync(manifestPath, "utf8"));
          const fleet = JSON.parse(readFileSync(fleetPath, "utf8"));
          const fleetMarkdown = readFileSync(fleetMarkdownPath, "utf8");
          const project = fleet.projects?.[0];

          function assert(condition, message) {
            if (!condition) throw new Error(message);
          }

          assert(manifest.selected?.path === "project.manifest.json", "GroundAtlas must select the vendor-neutral project.manifest.json file.");
          assert(manifest.selected?.adapter === false, "Selected GroundAtlas manifest must not be a vendor adapter.");
          assert(manifest.selected?.projectId === "consultant-mcp", "GroundAtlas selected the wrong project id.");
          assert(project?.status === "adopted", "Fleet report must mark consultant-mcp adopted.");
          assert(project?.generatedAtlas?.ok === true, "Generated GroundAtlas evidence must match the current scan.");
          assert(project?.manifest?.path === "project.manifest.json", "Fleet report must use project.manifest.json as the manifest.");
          assert(project?.manifestAdapters?.some((adapter) => adapter.path === ".doctrine/project.json" && adapter.adapter === true), "Fleet report must keep .doctrine/project.json as an adapter.");
          assert(fleetMarkdown.includes("# GroundAtlas fleet adoption report"), "Markdown fleet scorecard must include the report title.");
          assert(fleetMarkdown.includes("Summary: 1 adopted, 0 warning, 0 blocked, 1 total."), "Markdown fleet scorecard must include the adopted summary.");
          NODE

      - name: Upload GroundAtlas reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: groundatlas-package-dogfood
          path: |
            ${{ steps.groundatlas.outputs.manifest-report-path }}
            ${{ steps.groundatlas.outputs.fleet-report-path }}
            ${{ steps.groundatlas.outputs.fleet-markdown-report-path }}

  trunk-admission:
    name: trunk-admission/pass
    runs-on: sylphx-linux-standard
    needs:
      - risk-classification
      - ci
    if: ${{ !cancelled() }}
    steps:
      - name: ADR-29 trunk admission
        uses: SylphxAI/.github/.github/actions/adr29-admission@main
        with:
          mode: fan-in
          policy-mode: observe
          upstream-results-json: ${{ toJSON(needs) }}

  postsubmit-proof:
    name: postsubmit-proof/pass
    runs-on: sylphx-linux-standard
    needs:
      - risk-classification
      - ci
      - trunk-admission
    if: ${{ always() && github.event_name == 'push' && github.ref == 'refs/heads/main' && !cancelled() }}
    steps:
      - name: ADR-29 postsubmit proof
        uses: SylphxAI/.github/.github/actions/adr29-admission@main
        with:
          mode: postsubmit-proof
          policy-mode: enforce
          upstream-results-json: ${{ toJSON(needs) }}

  recovery-decision:
    name: recovery-decision/pass
    runs-on: sylphx-linux-standard
    needs:
      - risk-classification
      - ci
      - trunk-admission
      - postsubmit-proof
    if: ${{ always() && github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.postsubmit-proof.result != 'success' }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 2

      - name: ADR-29 recovery decision
        uses: SylphxAI/.github/.github/actions/adr29-admission@main
        with:
          mode: recovery-decision
          policy-mode: observe
          upstream-results-json: ${{ toJSON(needs) }}

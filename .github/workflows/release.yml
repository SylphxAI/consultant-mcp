name: Release

on:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  actions: write
  contents: write
  id-token: write

jobs:
  # Multi-arch native matrix (GitHub-hosted). Fail-closed: all targets required
  # before the publish job can assemble optionalDependency packages.
  build-natives:
    strategy:
      fail-fast: false
      matrix:
        settings:
          # Both Darwin targets on macos-latest; x86_64 is cross-compiled.
          # macos-13 Intel runners often queue indefinitely.
          - host: macos-latest
            target: aarch64-apple-darwin
          - host: macos-latest
            target: x86_64-apple-darwin
          - host: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
          - host: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu

    name: Native ${{ matrix.settings.target }}
    runs-on: ${{ matrix.settings.host }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.settings.target }}

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: release-native-${{ matrix.settings.target }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            release-native-${{ matrix.settings.target }}-

      - name: Build release natives
        run: |
          set -euo pipefail
          cargo build --release -p consultant-mcp-server --target ${{ matrix.settings.target }}
          BIN="target/${{ matrix.settings.target }}/release/consultant-mcp-server"
          test -f "$BIN"
          chmod +x "$BIN"
          file "$BIN" || true
          test "$(wc -c < "$BIN")" -gt 100000
          mkdir -p native-out
          cp "$BIN" native-out/consultant-mcp-server
          chmod +x native-out/consultant-mcp-server

      - name: Upload native artifact
        uses: actions/upload-artifact@v4
        with:
          name: consultant-native-${{ matrix.settings.target }}
          path: native-out/consultant-mcp-server
          if-no-files-found: error
          retention-days: 7

  publish:
    name: publish
    needs: build-natives
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Node.js for npm registry
        uses: actions/setup-node@v5
        with:
          node-version: "22.14.0"
          registry-url: "https://registry.npmjs.org"

      - name: Ensure npm supports provenance
        run: |
          npm install --global npm@^11.5.1
          npm --version

      - name: Install dependencies
        # npm install (not ci): platform optionalDeps may be unpublished while
        # this Release job is assembling/publishing them from matrix artifacts.
        run: npm install --no-fund --no-audit

      - uses: dtolnay/rust-toolchain@stable

      - name: Download multi-arch native artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: consultant-native-*

      - name: Assemble multi-arch platform packages (fail-closed)
        run: |
          set -euo pipefail
          echo "== multi-arch artifacts =="
          ls -laR artifacts || true
          npm run assemble:multiarch
          npm run sync:platform-versions
          for dir in npm/*/; do
            test -f "${dir}package.json"
            test -x "${dir}consultant-mcp-server"
            test "$(wc -c < "${dir}consultant-mcp-server")" -gt 100000
            echo "OK $(basename "$dir") $(wc -c < "${dir}consultant-mcp-server") bytes"
            file "${dir}consultant-mcp-server" || true
          done
          # Stage linux x64 into bin/native as host fallback (optionalDep is primary)
          mkdir -p bin/native
          cp npm/linux-x64-gnu/consultant-mcp-server bin/native/consultant-mcp-server
          chmod +x bin/native/consultant-mcp-server bin/sylphx-consultant-mcp
          test -x bin/sylphx-consultant-mcp
          head -n 12 bin/sylphx-consultant-mcp

      - name: Build TypeScript + verify package
        run: |
          set -euo pipefail
          # Host build keeps cargo tests / verify path green; multi-arch already assembled.
          npm run build:rust
          # Re-stage linux multiarch binary after host rebuild so pack matches release natives
          cp npm/linux-x64-gnu/consultant-mcp-server bin/native/consultant-mcp-server
          chmod +x bin/native/consultant-mcp-server
          npm run verify

      - name: Test project-control boundary
        run: npm run test:project-control

      - name: GroundAtlas release dogfood
        run: |
          npm exec --yes --package groundatlas@0.1.3 -- ga update --out .groundatlas-pilot
          npm exec --yes --package groundatlas@0.1.3 -- ga manifest --out .groundatlas-pilot --json | tee "$RUNNER_TEMP/groundatlas-release-manifest.json"
          npm exec --yes --package groundatlas@0.1.3 -- ga audit --out .groundatlas-pilot
          npm exec --yes --package groundatlas@0.1.3 -- ga fleet . --out .groundatlas-pilot --require-atlas --strict --json | tee "$RUNNER_TEMP/groundatlas-release-fleet.json"
          npm exec --yes --package groundatlas@0.1.3 -- ga fleet . --out .groundatlas-pilot --require-atlas --strict | tee "$RUNNER_TEMP/groundatlas-release-fleet.md"
          node - <<'NODE'
          const { readFileSync } = require("node:fs");
          const manifest = JSON.parse(readFileSync(`${process.env.RUNNER_TEMP}/groundatlas-release-manifest.json`, "utf8"));
          const fleet = JSON.parse(readFileSync(`${process.env.RUNNER_TEMP}/groundatlas-release-fleet.json`, "utf8"));
          const fleetMarkdown = readFileSync(`${process.env.RUNNER_TEMP}/groundatlas-release-fleet.md`, "utf8");
          if (manifest.selected?.path !== "project.manifest.json" || manifest.selected?.adapter !== false) throw new Error("GroundAtlas release manifest gate failed");
          if (fleet.summary.adopted !== 1 || fleet.summary.blocked !== 0 || fleet.summary.warning !== 0 || fleet.summary.total !== 1) throw new Error("GroundAtlas release fleet gate failed");
          if (!fleetMarkdown.includes("# GroundAtlas fleet adoption report") || !fleetMarkdown.includes("Summary: 1 adopted, 0 warning, 0 blocked, 1 total.")) throw new Error("GroundAtlas release Markdown scorecard gate failed");
          NODE

      - name: Resolve package release state
        id: pkg
        shell: bash
        run: |
          set -euo pipefail
          name=$(node -p "JSON.parse(require('node:fs').readFileSync('package.json', 'utf8')).name")
          version=$(node -p "JSON.parse(require('node:fs').readFileSync('package.json', 'utf8')).version")
          tag="v${version}"
          echo "name=${name}" >> "$GITHUB_OUTPUT"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"

          if npm view "${name}@${version}" version --json >/tmp/npm-version.json 2>/tmp/npm-view.err; then
            echo "publish=false" >> "$GITHUB_OUTPUT"
            cat /tmp/npm-version.json
          else
            if grep -E "E404|404 Not Found|not found" /tmp/npm-view.err >/dev/null; then
              echo "publish=true" >> "$GITHUB_OUTPUT"
              cat /tmp/npm-view.err
            else
              cat /tmp/npm-view.err
              exit 1
            fi
          fi

          if git ls-remote --exit-code --tags origin "refs/tags/${tag}" >/dev/null 2>&1; then
            echo "tag_exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "tag_exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish platform packages
        if: steps.pkg.outputs.publish == 'true'
        shell: bash
        run: |
          set -euo pipefail
          for dir in npm/*/; do
            pkg_name=$(node -p "JSON.parse(require('node:fs').readFileSync('${dir}package.json', 'utf8')).name")
            pkg_ver=$(node -p "JSON.parse(require('node:fs').readFileSync('${dir}package.json', 'utf8')).version")
            test -x "${dir}consultant-mcp-server"
            if npm view "${pkg_name}@${pkg_ver}" version --json >/dev/null 2>&1; then
              echo "SKIP already published ${pkg_name}@${pkg_ver}"
              continue
            fi
            echo "Publishing ${pkg_name}@${pkg_ver} from ${dir}"
            (
              cd "$dir"
              npm publish --access public --provenance
            )
          done
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish main package to npm with provenance
        if: steps.pkg.outputs.publish == 'true'
        run: |
          set -euo pipefail
          # prepublishOnly rebuilds host rust; re-stage multi-arch linux binary after that
          # so published bin/native matches the release matrix artifact.
          npm publish --access public --provenance
          # Note: prepublishOnly may overwrite bin/native with host rebuild — re-check
          file bin/native/consultant-mcp-server || true
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Registry readback (main + multi-arch)
        shell: bash
        run: |
          set -euo pipefail
          for attempt in $(seq 1 40); do
            echo "npm registry readback attempt ${attempt}/40"
            if npm view "${{ steps.pkg.outputs.name }}@${{ steps.pkg.outputs.version }}" version dist-tags time gitHead dist.integrity dist.attestations --json > "$RUNNER_TEMP/npm-readback.json"; then
              cat "$RUNNER_TEMP/npm-readback.json"
              node -e "const r=require(process.env.RUNNER_TEMP + '/npm-readback.json'); if (r.version !== '${{ steps.pkg.outputs.version }}') throw new Error('npm readback version mismatch')"
              break
            fi
            if [[ "$attempt" -eq 40 ]]; then
              echo "npm registry readback did not converge for ${{ steps.pkg.outputs.name }}@${{ steps.pkg.outputs.version }}" >&2
              exit 1
            fi
            sleep 10
          done
          # Fail-closed multi-arch platform package readback (tarball + retries)
          npm run verify:multiarch-readback

      - name: Smoke installed package
        shell: bash
        run: |
          set -euo pipefail
          tmp=$(mktemp -d)
          npm install --prefix "$tmp" "${{ steps.pkg.outputs.name }}@${{ steps.pkg.outputs.version }}"
          pkg_root="$tmp/node_modules/${{ steps.pkg.outputs.name }}"
          test -x "$pkg_root/bin/sylphx-consultant-mcp"
          # Prefer optionalDependency platform package for host (linux x64 on runner)
          opt="$tmp/node_modules/@sylphx/consultant-mcp-linux-x64-gnu/consultant-mcp-server"
          if [[ -x "$opt" ]]; then
            file "$opt" || true
            echo "optionalDep platform package present"
          else
            echo "WARN: optionalDep not installed; falling back to bin/native"
            test -x "$pkg_root/bin/native/consultant-mcp-server"
            file "$pkg_root/bin/native/consultant-mcp-server" || true
          fi
          ls -la "$tmp/node_modules/.bin/sylphx-consultant-mcp" "$pkg_root/bin/sylphx-consultant-mcp"
          # Bare stdio MCP exits 1 on immediate EOF ("connection closed: initialized request").
          # Use the Rust binary's `doctor` subcommand for a fail-closed consumer-path smoke
          # that still exercises the npm .bin → launcher → optionalDep/native resolution chain.
          out="$(CONSULTANT_MOCK=true "$tmp/node_modules/.bin/sylphx-consultant-mcp" doctor 2>&1)"
          echo "$out"
          echo "$out" | grep -E 'consultant-mcp Rust MCP server' >/dev/null
          echo "$out" | grep -F "${{ steps.pkg.outputs.version }}" >/dev/null
          rm -rf "$tmp"

      - name: Create release tag
        if: steps.pkg.outputs.tag_exists == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "${{ steps.pkg.outputs.tag }}" "${GITHUB_SHA}"
          git push origin "refs/tags/${{ steps.pkg.outputs.tag }}"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          if gh release view "${{ steps.pkg.outputs.tag }}" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release view "${{ steps.pkg.outputs.tag }}" --repo "$GITHUB_REPOSITORY" --json tagName,publishedAt,url
          else
            gh release create "${{ steps.pkg.outputs.tag }}" \
              --repo "$GITHUB_REPOSITORY" \
              --title "${{ steps.pkg.outputs.name }} ${{ steps.pkg.outputs.tag }}" \
              --notes "Published ${{ steps.pkg.outputs.name }}@${{ steps.pkg.outputs.version }} to npm (multi-arch optionalDependencies) through protected GitHub Actions release workflow with npm provenance."
          fi

      - name: GitHub release readback
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release view "${{ steps.pkg.outputs.tag }}" --repo "$GITHUB_REPOSITORY" --json tagName,publishedAt,url,assets | tee "$RUNNER_TEMP/github-release-readback.json"

      - name: Upload release evidence
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: consultant-mcp-release-evidence
          path: |
            ${{ runner.temp }}/groundatlas-release-manifest.json
            ${{ runner.temp }}/groundatlas-release-fleet.json
            ${{ runner.temp }}/groundatlas-release-fleet.md
            ${{ runner.temp }}/npm-readback.json
            ${{ runner.temp }}/github-release-readback.json
          if-no-files-found: warn

name: Release

on:
  push:
    branches: [main]

jobs:
  release:
    permissions:
      actions: write
      contents: write
      pull-requests: write
      id-token: write
    uses: SylphxAI/.github/.github/workflows/release.yml@main
    with:
      build: bun run typecheck && bun test src && bun run build && bun pm pack --dry-run
      prepublish: |
        bunx --bun --package groundatlas@0.1.2 ga update --out .groundatlas-pilot
        bunx --bun --package groundatlas@0.1.2 ga audit --out .groundatlas-pilot
        bunx --bun --package groundatlas@0.1.2 ga fleet . --out .groundatlas-pilot --require-atlas --strict --json
    secrets: inherit
